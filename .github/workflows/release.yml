name: Release agent

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows-exe:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install and build exe
        run: |
          npm ci
          npm run build:exe

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/idlechip-agent-win-x64.exe
          generate_release_notes: true
